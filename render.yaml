services:
  - type: web
    name: orderr
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PLANT_NAME
        value: Fluffy
      - key: REPORT_TIME
        value: "22:00"
      - key: MANAGER_PHONE
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      # ── Daily Production Report — email delivery ───────────────────────────
      - key: REPORT_EMAIL       # comma-separated, e.g. "owner@co.in,ops@co.in"
        sync: false
      - key: SMTP_HOST          # default: smtp.gmail.com
        value: "smtp.gmail.com"
      - key: SMTP_PORT          # default: 587 (TLS)
        value: "587"
      - key: SMTP_USER          # Gmail address used to send
        sync: false
      - key: SMTP_PASSWORD      # Gmail App Password (not your login password)
        sync: false
      - key: SMTP_FROM_NAME     # Display name in From field
        value: "Fluffy OrdeRR"