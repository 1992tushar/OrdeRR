services:
  - type: web
    name: orderr
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PLANT_NAME
        value: Fluffy
      - key: REPORT_TIME
        value: "22:00"
      - key: MANAGER_PHONE
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      # ── Billing feature flags (all OFF in production until ready) ──
      - key: FLAG_BILLING_ENABLED
        value: "false"
      - key: FLAG_BILLING_AUTO_INVOICE
        value: "false"
      - key: FLAG_BILLING_BULK_GENERATE
        value: "false"
      # ── Billing config ──
      - key: INVOICE_PREFIX
        value: "INV"
      - key: INVOICE_START
        value: "1"
      - key: INVOICE_DIR
        value: "/tmp/invoices"
      - key: PLACE_OF_SUPPLY
        value: "Maharashtra"